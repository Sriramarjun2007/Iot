  <div class="wrap navrow">

    <nav class="links">
      <a href="index.html" data-page="home">Home</a>

<main>
  <section class="wrap" style="padding-top:44px;">
    <div class="eyebrow">Catalog</div>
    <h1 style="font-size:34px;margin-bottom:20px;">All IoT Projects</h1>

      <span class="mono" style="color:var(--muted);">⌕</span>

    <div class="grid" id="projectGrid"></div>

<script src="Data.js"></script>
<script>
  initShell('projects');
  let projects = [];
  let activeFilter = "All";
  let searchTerm = "";

  function categories(){ return ["All", ...new Set(projects.map(p=>p.category))]; }

  function cardHTML(p){
    const isNew = (Date.now()-p.createdAt) < 1000*60*60*24*7;
    return `<div class="card">
      <div class="pins"><i></i><i></i><i></i><i></i><i></i><i></i></div>
      <div class="card-body">
        <div class="tag-row"><span class="tag">${esc(p.category)}</span><span class="tag">${esc(p.difficulty)}</span>${isNew?'<span class="tag new">New</span>':''}</div>
        <h3>${esc(p.title)}</h3>
        <p class="desc">${esc(p.desc)}</p>
        <div class="card-foot">
          <span class="price">${fmt(p.price)}</span>
          <a class="btn small secondary" href="project.html?id=${p.id}">View →</a>
        </div>
      </div>
    </div>`;
  }

  function renderFilters(){
    document.getElementById('filters').innerHTML = categories().map(c =>
      `<button class="filter-chip ${c===activeFilter?'active':''}" data-cat="${esc(c)}">${esc(c)}</button>`
    ).join('');
    document.querySelectorAll('.filter-chip').forEach(btn=>{
      btn.addEventListener('click', ()=>{ activeFilter = btn.dataset.cat; renderFilters(); renderGrid(); });
    });
  }

  function renderGrid(){
    const list = projects.filter(p=>{
      const matchCat = activeFilter==='All' || p.category===activeFilter;
      const matchSearch = !searchTerm || p.title.toLowerCase().includes(searchTerm.toLowerCase());
      return matchCat && matchSearch;
    });
    document.getElementById('projectGrid').innerHTML = list.map(cardHTML).join('');
    document.getElementById('emptyMsg').classList.toggle('hide', list.length>0);
  }

  document.getElementById('searchInput').addEventListener('input', (e)=>{
    searchTerm = e.target.value; renderGrid();
  });

  (async function(){
    try {
      projects = await getProjects();
      renderFilters();
      renderGrid();
    } catch(err){
      console.error(err);
      document.getElementById('projectGrid').innerHTML = '<p style="color:var(--muted);">Unable to load projects.</p>';
    }
  })();
</script>
</body>
</html>
